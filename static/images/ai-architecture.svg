  <text x="280" y="358" text-anchor="middle" fill="#f85149" opacity="0.7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28">✕</text>
  <text x="160" y="268" text-anchor="middle" fill="#f85149" opacity="0.7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28">✕</text>
  <text x="400" y="268" text-anchor="middle" fill="#f85149" opacity="0.7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28">✕</text>

