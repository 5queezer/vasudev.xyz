  <line x1="1010" y1="240" x2="1100" y2="150" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
  <line x1="790" y1="330" x2="700" y2="430" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
