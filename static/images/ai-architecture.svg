  <text x="1110" y="441" text-anchor="middle" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="14">Drive</text>

  <!-- MCP labels on lines (larger, more visible, no rotation) -->
  <rect x="718" y="178" width="36" height="16" rx="3" fill="#0d1117"/>
  <text x="736" y="190" text-anchor="middle" fill="#3fb950" opacity="0.7" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="600" font-size="11">MCP</text>

  <rect x="1048" y="178" width="36" height="16" rx="3" fill="#0d1117"/>
  <text x="1066" y="190" text-anchor="middle" fill="#3fb950" opacity="0.7" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="600" font-size="11">MCP</text>

  <rect x="718" y="378" width="36" height="16" rx="3" fill="#0d1117"/>
  <text x="736" y="390" text-anchor="middle" fill="#3fb950" opacity="0.7" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="600" font-size="11">MCP</text>

  <rect x="1048" y="378" width="36" height="16" rx="3" fill="#0d1117"/>
  <text x="1066" y="390" text-anchor="middle" fill="#3fb950" opacity="0.7" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="600" font-size="11">MCP</text>

