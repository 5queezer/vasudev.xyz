<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">

  <!-- Background -->
  <rect width="900" height="400" fill="#0d1117"/>

  <!-- Defs -->
  <defs>
    <marker id="dream-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="dream-arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Phase 0 -->
  <rect x="30" y="60" width="100" height="55" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="1"/>
  <text x="80" y="82" text-anchor="middle" fill="#CECBF6" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12">Phase 0</text>
  <text x="80" y="100" text-anchor="middle" fill="#AFA9EC" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Orient</text>

  <!-- Arrow 0→1 -->
  <line x1="130" y1="87" x2="155" y2="87" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Phase 1 -->
  <rect x="160" y="60" width="100" height="55" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="210" y="82" text-anchor="middle" fill="#D3D1C7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12">Phase 1</text>
  <text x="210" y="100" text-anchor="middle" fill="#B4B2A9" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Replay</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="87" x2="285" y2="87" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Phase 2 -->
  <rect x="290" y="60" width="100" height="55" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="340" y="82" text-anchor="middle" fill="#D3D1C7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12">Phase 2</text>
  <text x="340" y="100" text-anchor="middle" fill="#B4B2A9" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Dedup</text>

  <!-- BRANCH POINT -->
  <!-- Arrow from Phase 2 down to branch decision -->
  <line x1="340" y1="115" x2="340" y2="155" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Branch decision diamond-ish box -->
  <rect x="295" y="160" width="90" height="36" rx="4" fill="#161b22" stroke="#c9d1d9" stroke-width="1"/>
  <text x="340" y="183" text-anchor="middle" fill="#c9d1d9" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">Vault type?</text>

  <!-- Legal branch: goes down to Skip -->
  <line x1="295" y1="178" x2="180" y2="178" stroke="#f85149" stroke-width="1.5" marker-end="url(#dream-arrow-red)"/>
  <rect x="95" y="160" width="80" height="36" rx="4" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="135" y="183" text-anchor="middle" fill="#f85149" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="12">Skip</text>
  <text x="135" y="218" text-anchor="middle" fill="#f85149" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9" opacity="0.7">Legal vaults</text>
  <text x="135" y="232" text-anchor="middle" fill="#f85149" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9" opacity="0.7">no LLM contact</text>

  <!-- Other vaults: continues right to Phase 2b -->
  <line x1="385" y1="178" x2="425" y2="178" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>
  <text x="405" y="170" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="8">other</text>

  <!-- Phase 2b (LLM) -->
  <rect x="430" y="160" width="110" height="36" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="1"/>
  <text x="485" y="176" text-anchor="middle" fill="#CECBF6" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11">Phase 2b</text>
  <text x="485" y="190" text-anchor="middle" fill="#AFA9EC" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">LLM consolidate</text>

  <!-- Arrow 2b→3 -->
  <line x1="540" y1="178" x2="565" y2="178" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Phase 3 -->
  <rect x="570" y="160" width="90" height="36" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="615" y="176" text-anchor="middle" fill="#D3D1C7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11">Phase 3</text>
  <text x="615" y="190" text-anchor="middle" fill="#B4B2A9" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Schema</text>

  <!-- Arrow 3→4 -->
  <line x1="660" y1="178" x2="685" y2="178" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Phase 4 (LLM) -->
  <rect x="690" y="160" width="90" height="36" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="1"/>
  <text x="735" y="176" text-anchor="middle" fill="#CECBF6" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11">Phase 4</text>
  <text x="735" y="190" text-anchor="middle" fill="#AFA9EC" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Stability</text>

  <!-- Wrap to next row -->
  <path d="M780 178 L820 178 L820 270 L80 270" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Phase 5 -->
  <rect x="30" y="252" width="100" height="36" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="80" y="268" text-anchor="middle" fill="#D3D1C7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11">Phase 5</text>
  <text x="80" y="282" text-anchor="middle" fill="#B4B2A9" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Inference</text>

  <!-- Arrow 5→6 -->
  <line x1="130" y1="270" x2="165" y2="270" stroke="#8b949e" stroke-width="1.5" marker-end="url(#dream-arrow)"/>

  <!-- Phase 6 (LLM) -->
  <rect x="170" y="252" width="110" height="36" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="1"/>
  <text x="225" y="268" text-anchor="middle" fill="#CECBF6" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11">Phase 6</text>
  <text x="225" y="282" text-anchor="middle" fill="#AFA9EC" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Dream journal</text>

  <!-- Legend -->
  <rect x="30" y="330" width="840" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Legend title -->
  <text x="60" y="353" text-anchor="start" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12">Vault Trust Tiers</text>

  <!-- Legal -->
  <rect x="210" y="341" width="12" height="12" rx="3" fill="#f85149" opacity="0.3" stroke="#f85149" stroke-width="1"/>
  <text x="228" y="352" text-anchor="start" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">Legal: no LLM</text>

  <!-- Work -->
  <rect x="380" y="341" width="12" height="12" rx="3" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
  <text x="398" y="352" text-anchor="start" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">Work: local only</text>

  <!-- Global -->
  <rect x="560" y="341" width="12" height="12" rx="3" fill="#3C3489" stroke="#7F77DD" stroke-width="1"/>
  <text x="578" y="352" text-anchor="start" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">Global: any provider</text>

  <!-- Purple = LLM phase indicator -->
  <text x="750" y="367" text-anchor="start" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Purple = LLM phase</text>

  <!-- Attribution -->
  <text x="870" y="390" text-anchor="end" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">vasudev.xyz</text>
</svg>
