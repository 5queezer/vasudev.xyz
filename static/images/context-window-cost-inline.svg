<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">

  <!-- Background -->
  <rect width="900" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="16">Context Window Token Usage</text>

  <!-- BEFORE bar -->
  <text x="60" y="120" text-anchor="start" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="14">Before</text>
  <text x="60" y="140" text-anchor="start" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">~77K tokens</text>

  <!-- Before bar background -->
  <rect x="180" y="108" width="580" height="44" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Before: Tool definitions (large, red) -->
  <rect x="180" y="108" width="530" height="44" rx="4" fill="#f85149" opacity="0.25"/>
  <rect x="180" y="108" width="530" height="44" rx="4" fill="none" stroke="#f85149" stroke-width="1" opacity="0.5"/>
  <text x="445" y="134" text-anchor="middle" fill="#f85149" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" font-weight="600">Tool definitions (91%)</text>

  <!-- Before: Your work (tiny sliver) -->
  <rect x="710" y="108" width="50" height="44" rx="4" fill="#3fb950" opacity="0.2"/>
  <text x="735" y="134" text-anchor="middle" fill="#3fb950" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9">Work</text>

  <!-- AFTER bar -->
  <text x="60" y="220" text-anchor="start" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="14">After</text>
  <text x="60" y="240" text-anchor="start" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">~8.7K tokens</text>
  <text x="60" y="256" text-anchor="start" fill="#7ee787" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">defer_loading</text>

  <!-- After bar background -->
  <rect x="180" y="212" width="580" height="44" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- After: Tool search (small) -->
  <rect x="180" y="212" width="65" height="44" rx="4" fill="#7F77DD" opacity="0.25"/>
  <rect x="180" y="212" width="65" height="44" rx="4" fill="none" stroke="#7F77DD" stroke-width="1" opacity="0.5"/>
  <text x="212" y="238" text-anchor="middle" fill="#7F77DD" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="9" font-weight="600">Search</text>

  <!-- After: Your work (most of the bar) -->
  <rect x="245" y="212" width="515" height="44" rx="4" fill="#3fb950" opacity="0.15"/>
  <rect x="245" y="212" width="515" height="44" rx="4" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <text x="502" y="238" text-anchor="middle" fill="#3fb950" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" font-weight="600">Your work</text>

  <!-- Annotation -->
  <rect x="660" y="296" width="120" height="36" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="1.5"/>
  <text x="720" y="320" text-anchor="middle" fill="#3fb950" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="18">-85%</text>

  <!-- Annotation label -->
  <text x="720" y="346" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">overhead reduction</text>

  <!-- Arrow from annotation to gap -->
  <line x1="660" y1="314" x2="580" y2="260" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Attribution -->
  <text x="870" y="390" text-anchor="end" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">vasudev.xyz</text>
</svg>
