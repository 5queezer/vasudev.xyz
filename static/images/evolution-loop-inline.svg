<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">

  <!-- Background -->
  <rect width="900" height="400" fill="#0d1117"/>

  <!-- Defs -->
  <defs>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Center label -->
  <text x="450" y="196" text-anchor="middle" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">mutation/selection</text>
  <text x="450" y="212" text-anchor="middle" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">cycle</text>

  <!-- Hexagonal layout: 6 nodes around center -->
  <!-- Node 1: Observe (top center) -->
  <rect x="370" y="30" width="160" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="54" text-anchor="middle" fill="#3fb950" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14">1. Observe</text>
  <text x="450" y="74" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">measure behavior</text>

  <!-- Node 2: Propose (top right) -->
  <rect x="640" y="100" width="160" height="56" rx="8" fill="#161b22" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="720" y="124" text-anchor="middle" fill="#7F77DD" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14">2. Propose</text>
  <text x="720" y="144" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">generate mutations</text>

  <!-- Node 3: Sandbox (bottom right) -->
  <rect x="640" y="240" width="160" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="720" y="264" text-anchor="middle" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14">3. Sandbox</text>
  <text x="720" y="284" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">isolated execution</text>

  <!-- Node 4: Evaluate (bottom center) -->
  <rect x="370" y="310" width="160" height="56" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="334" text-anchor="middle" fill="#3fb950" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14">4. Evaluate</text>
  <text x="450" y="354" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">score behavioral delta</text>

  <!-- Node 5: Retain/Reject (bottom left) -->
  <rect x="100" y="240" width="160" height="56" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="180" y="264" text-anchor="middle" fill="#c9d1d9" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14">5. Retain/Reject</text>
  <text x="180" y="284" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">write to persistence</text>

  <!-- Node 6: Update prior (top left) -->
  <rect x="100" y="100" width="160" height="56" rx="8" fill="#161b22" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="180" y="124" text-anchor="middle" fill="#7F77DD" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14">6. Update prior</text>
  <text x="180" y="144" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">adjust search policy</text>

  <!-- Arrows connecting nodes in cycle: 1→2→3→4→5→6→1 -->
  <!-- 1→2 -->
  <line x1="530" y1="65" x2="640" y2="115" stroke="#3fb950" stroke-width="1.5" opacity="0.6" marker-end="url(#loop-arrow)"/>
  <!-- 2→3 -->
  <line x1="720" y1="156" x2="720" y2="240" stroke="#3fb950" stroke-width="1.5" opacity="0.6" marker-end="url(#loop-arrow)"/>
  <!-- 3→4 -->
  <line x1="640" y1="280" x2="530" y2="330" stroke="#3fb950" stroke-width="1.5" opacity="0.6" marker-end="url(#loop-arrow)"/>
  <!-- 4→5 -->
  <line x1="370" y1="330" x2="260" y2="280" stroke="#3fb950" stroke-width="1.5" opacity="0.6" marker-end="url(#loop-arrow)"/>
  <!-- 5→6 -->
  <line x1="180" y1="240" x2="180" y2="156" stroke="#3fb950" stroke-width="1.5" opacity="0.6" marker-end="url(#loop-arrow)"/>
  <!-- 6→1 -->
  <line x1="260" y1="115" x2="370" y2="65" stroke="#3fb950" stroke-width="1.5" opacity="0.6" marker-end="url(#loop-arrow)"/>

  <!-- Attribution -->
  <text x="870" y="390" text-anchor="end" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">vasudev.xyz</text>
</svg>
