<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">

  <!-- Background -->
  <rect width="900" height="400" fill="#0d1117"/>

  <!-- Defs -->
  <defs>
    <marker id="timeline-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Timeline arrow -->
  <line x1="60" y1="170" x2="840" y2="170" stroke="#484f58" stroke-width="2" marker-end="url(#timeline-arrow)"/>

  <!-- Divider line at boundary -->
  <line x1="460" y1="70" x2="460" y2="290" stroke="#c9d1d9" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="400" y="62" width="120" height="22" rx="4" fill="#0d1117"/>
  <text x="460" y="79" text-anchor="middle" fill="#c9d1d9" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="600" font-size="11">Last input token</text>

  <!-- LEFT: Encoding zone -->
  <rect x="80" y="100" width="360" height="50" rx="8" fill="#3C3489" opacity="0.2" stroke="#7F77DD" stroke-width="1"/>
  <text x="260" y="118" text-anchor="middle" fill="#7F77DD" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="16">Encoding</text>
  <text x="260" y="140" text-anchor="middle" fill="#AFA9EC" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">Model reads prompt</text>

  <!-- Encoding detail below -->
  <text x="260" y="210" text-anchor="middle" fill="#7F77DD" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13">Sycophancy manifests here</text>
  <text x="260" y="236" text-anchor="middle" fill="#3fb950" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="20">&#x2713;</text>
  <text x="260" y="260" text-anchor="middle" fill="#3fb950" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">Cohen's d = 9.9</text>

  <!-- RIGHT: Generation zone -->
  <rect x="480" y="100" width="340" height="50" rx="8" fill="#f85149" opacity="0.1" stroke="#f85149" stroke-width="1" opacity="0.5"/>
  <text x="650" y="118" text-anchor="middle" fill="#f85149" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="16">Generation</text>
  <text x="650" y="140" text-anchor="middle" fill="#f85149" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11" opacity="0.7">Model writes response</text>

  <!-- Generation detail below -->
  <text x="650" y="210" text-anchor="middle" fill="#f85149" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="13">Hallucination manifests here</text>
  <text x="650" y="236" text-anchor="middle" fill="#f85149" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="20">&#x2717;</text>
  <text x="650" y="260" text-anchor="middle" fill="#f85149" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">Cohen's d &lt; 1.0</text>

  <!-- Bottom annotation -->
  <rect x="60" y="305" width="380" height="40" rx="4" fill="#3C3489" opacity="0.15" stroke="#7F77DD" stroke-width="1" opacity="0.4"/>
  <text x="80" y="330" text-anchor="start" fill="#AFA9EC" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11">SAE contrastive analysis measures here &#x2192;</text>

  <!-- Arrow pointing at encoding zone from annotation -->
  <line x1="250" y1="305" x2="250" y2="268" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Attribution -->
  <text x="870" y="390" text-anchor="end" fill="#484f58" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="10">vasudev.xyz</text>
</svg>
