<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href='{{ "css/style.css" | relURL }}'>
  {{ template "_internal/opengraph.html" . }}
  {{- with .OutputFormats.Get "txtplain" }}
  <link rel="alternate" type="{{ .MediaType }}" href="{{ .Permalink }}" title="{{ $.Title }} (plain text)">
  {{- end }}
  <script>
    (function() {
      var s = localStorage.getItem('theme');
      if (s === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else if (!s && window.matchMedia('(prefers-color-scheme: light)').matches)
        document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body class='{{ if .IsHome }}is-home{{ else }}is-interior{{ end }}'>
  <div class="noise-overlay" aria-hidden="true"></div>
  <script>
    window.identicon = function(str, size) {
      var h = 5381;
      for (var i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
      var h2 = 2166136261;
      for (var i = 0; i < str.length; i++) h2 = (h2 ^ str.charCodeAt(i)) * 16777619 >>> 0;
      var hue = h % 360, sat = 40 + (h2 % 20), lit = 45 + (h2 % 15);
      var fg = 'hsl(' + hue + ',' + sat + '%,' + lit + '%)';
      var bg = 'hsl(' + hue + ',' + Math.max(sat - 20, 10) + '%,' + (lit + 35) + '%)';
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5 5" width="' + size + '" height="' + size + '" style="border-radius:20%">';
      svg += '<rect width="5" height="5" fill="' + bg + '"/>';
      for (var r = 0; r < 5; r++) {
        for (var c = 0; c < 3; c++) {
          if ((h >>> (r * 3 + c)) & 1) {
            svg += '<rect x="' + c + '" y="' + r + '" width="1" height="1" fill="' + fg + '"/>';
            if (c < 2) svg += '<rect x="' + (4 - c) + '" y="' + r + '" width="1" height="1" fill="' + fg + '"/>';
          }
        }
      }
      return svg + '</svg>';
    };
  </script>
  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'light' ? 'dark' : 'light';
      if (next === 'dark') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
      localStorage.setItem('theme', next);
    }
  </script>
  {{ block "main" . }}{{ end }}
  <script>
    (function() {
      var header = document.querySelector('.page-chrome');
      if (!header) return;
      var mobileMq = window.matchMedia('(max-width: 720px)');
      var lastY = window.scrollY;
      var threshold = 60;
      function resetIfDesktop() {
        if (!mobileMq.matches) header.classList.remove('header-hidden');
      }
      mobileMq.addEventListener('change', resetIfDesktop);
      window.addEventListener('scroll', function() {
        var y = window.scrollY;
        if (!mobileMq.matches) { lastY = y; return; }
        if (y > lastY && y > threshold) {
          header.classList.add('header-hidden');
        } else if (y < lastY) {
          header.classList.remove('header-hidden');
        }
        lastY = y;
      }, { passive: true });
    })();
  </script>
</body>
</html>
