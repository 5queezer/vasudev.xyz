{{ define "main" }}
<div class="site-shell site-shell-narrow">
  {{ partial "site-header.html" . }}

  <article class="post-shell">
    <header class="surface post-hero">
      <div class="section-label">{{ i18n "about" }}</div>
      <div class="post-header">
        <h1>{{ .Site.Params.author }}</h1>
        {{ with .Description }}<p class="page-copy">{{ . }}</p>{{ end }}
      </div>
    </header>

    <div class="surface post-surface">
      <div class="post-content">
        {{ .Content }}
      </div>
    </div>
  </article>

  <footer class="site-footer">
    <div class="site-footer-copy">Notes on systems, agents, memory, and privacy-first software.</div>
    <div class="site-footer-links">
      <a href="{{ relLangURL "blog/" }}">{{ i18n "blog" }}</a>
      <a href="{{ relLangURL "" }}">{{ i18n "home" }}</a>
      <a href="mailto:christian.pojoni@gmail.com">{{ i18n "email" }}</a>
    </div>
  </footer>
</div>
{{ end }}
