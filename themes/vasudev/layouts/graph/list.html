{{ define "main" }}
<div class="graph-page">
  {{ partial "site-header.html" . }}

  <div id="graph-container"></div>
  <div id="graph-labels"></div>

  <div class="graph-controls">
    <div class="graph-search">
      <input type="text" id="graph-search" placeholder="Search nodes..." autocomplete="off" />
    </div>
    <div class="graph-filters">
      <button class="graph-btn graph-btn-active" data-filter="all">All</button>
      <button class="graph-btn" data-filter="posts">Posts</button>
      <button class="graph-btn" data-filter="concepts">Concepts</button>
    </div>
    <div class="graph-legend" id="graph-legend"></div>
    <div class="graph-stats" id="graph-stats"></div>
  </div>

  <div class="graph-tooltip" id="graph-tooltip"></div>
</div>

<style>
  #graph-labels {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }
  .graph-label {
    position: absolute;
    white-space: nowrap;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 11px;
    line-height: 1;
    padding: 2px 5px;
    border-radius: 3px;
    transform: translate(-50%, -100%);
    transition: none;
    will-change: transform, opacity;
  }
</style>

<script src="https://unpkg.com/3d-force-graph@1.80.0/dist/3d-force-graph.min.js" integrity="sha384-Y7bC2PBKu8ujxtvo5+Z61OeGdSVRzFsYWBK4i5dnL/U6aFDTodk61qOUkTfInaxS" crossorigin="anonymous"></script>
<script>
(function() {
  var COMMUNITY_COLORS = [
    '#d7a673', '#8ec5a0', '#7bacd9', '#d98cb8', '#c5c56a',
    '#e07a6a', '#9b8ed4', '#6ac5c5', '#d4a06a', '#a0d468',
    '#e0a3d4', '#6ab0d4', '#d4c76a', '#7ad49b', '#d47a9b',
    '#a3bfe0', '#d4986a', '#6ad4b0'
  ];

  var LABEL_SHOW_THRESHOLD = 0.012;
  var LABEL_FULL_THRESHOLD = 0.018;
  var LABEL_MAX_CHARS = 28;

  var graphDataUrl = '{{ "/data/graph.json" | relURL }}';
  var blogBaseUrl = '{{ "blog/" | relLangURL }}';

  var container = document.getElementById('graph-container');
  var labelsLayer = document.getElementById('graph-labels');
  var tooltip = document.getElementById('graph-tooltip');
  var searchInput = document.getElementById('graph-search');
  var legend = document.getElementById('graph-legend');
  var stats = document.getElementById('graph-stats');
  var activeFilter = 'all';
  var searchTerm = '';
  var graphData = null;
  var graph = null;
  var hoveredNode = null;

  function linkId(endpoint) {
    return typeof endpoint === 'object' ? endpoint.id : endpoint;
  }

  function esc(s) {
    var el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }

  function truncateLabel(text) {
    if (text.length <= LABEL_MAX_CHARS) return text;
    return text.substring(0, LABEL_MAX_CHARS - 1) + '\u2026';
  }

  function createLabelEl(node) {
    var el = document.createElement('div');
    el.className = 'graph-label';
    el.textContent = truncateLabel(node.label);
    el.style.opacity = '0';
    el.style.fontSize = node.degree >= 6 ? '12px' : '11px';
    el.style.fontWeight = node.degree >= 6 ? '600' : '400';
    labelsLayer.appendChild(el);
    node.__labelEl = el;
    node.__labelOpacity = 0;
    return el;
  }

  function updateLabelColors() {
    var dark = isDark();
    var color = dark ? '#f4f1eb' : '#211d18';
    var bg = dark ? 'rgba(9,9,11,0.55)' : 'rgba(246,242,235,0.55)';
    var labels = labelsLayer.children;
    for (var i = 0; i < labels.length; i++) {
      labels[i].style.color = color;
      labels[i].style.backgroundColor = bg;
    }
  }

  if (typeof ForceGraph3D === 'undefined') {
    stats.textContent = 'Error: 3d-force-graph library failed to load';
  }

  fetch(graphDataUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(raw) {
      var blogSources = ['content/blog/', 'static/images/'];
      function isBlogNode(n) {
        if (n.file_type === 'code') return false;
        var sf = n.source_file || '';
        if (sf === 'README.md' || sf === 'CLAUDE.md') return false;
        if (!sf) return true;
        for (var i = 0; i < blogSources.length; i++) {
          if (sf.startsWith(blogSources[i])) return true;
        }
        return n.file_type === 'concept';
      }

      var nodeIds = {};
      var nodes = raw.nodes.filter(isBlogNode).map(function(n) {
        nodeIds[n.id] = true;
        return {
          id: n.id,
          label: n.label,
          sourceFile: n.source_file || '',
          fileType: n.file_type || '',
          community: n.community != null ? n.community : -1,
          communityName: n.community_name || '',
          degree: 0
        };
      });

      var edges = (raw.links || []).filter(function(e) {
        return nodeIds[e.source] && nodeIds[e.target];
      }).map(function(e) {
        return {
          source: e.source,
          target: e.target,
          relation: e.relation,
          confidence: e.confidence_score || 1.0
        };
      });

      var degreeMap = {};
      edges.forEach(function(e) {
        degreeMap[e.source] = (degreeMap[e.source] || 0) + 1;
        degreeMap[e.target] = (degreeMap[e.target] || 0) + 1;
      });
      nodes.forEach(function(n) { n.degree = degreeMap[n.id] || 0; });
      nodes = nodes.filter(function(n) { return n.degree > 0; });

      graphData = { nodes: nodes, links: edges };

      stats.textContent = nodes.length + ' nodes, ' + edges.length + ' edges';

      renderGraph();
    })
    .catch(function(err) {
      stats.textContent = 'Error loading graph: ' + err.message;
      console.error('Graph load failed:', err);
    });

  function isVisible(n) {
    if (activeFilter === 'posts') {
      if (!n.sourceFile.startsWith('content/blog/')) return false;
    } else if (activeFilter === 'concepts') {
      if (n.fileType === 'code' || n.sourceFile.startsWith('content/blog/')) return false;
    }
    if (searchTerm && !n.label.toLowerCase().includes(searchTerm)) return false;
    return true;
  }

  function getFilteredData() {
    if (!graphData) return { nodes: [], links: [] };
    var visibleIds = {};
    var filteredNodes = graphData.nodes.filter(function(n) {
      var v = isVisible(n);
      if (v) visibleIds[n.id] = true;
      return v;
    });
    var filteredLinks = graphData.links.filter(function(e) {
      var sourceId = linkId(e.source);
      var targetId = linkId(e.target);
      return visibleIds[sourceId] && visibleIds[targetId];
    });
    return { nodes: filteredNodes, links: filteredLinks };
  }

  function slugFromSourceFile(sf) {
    if (!sf.startsWith('content/blog/')) return null;
    return sf.replace('content/blog/', '').replace(/\.md$/, '');
  }

  function buildTooltip(node) {
    tooltip.textContent = '';
    var strong = document.createElement('strong');
    strong.textContent = node.label;
    tooltip.appendChild(strong);

    tooltip.appendChild(document.createElement('br'));
    var commLabel = node.communityName || ('Community ' + node.community);
    tooltip.appendChild(document.createTextNode(
      commLabel + ' \u00B7 ' + node.degree + ' connections'
    ));

    if (node.fileType) {
      tooltip.appendChild(document.createElement('br'));
      tooltip.appendChild(document.createTextNode('Type: ' + node.fileType));
    }

    var slug = slugFromSourceFile(node.sourceFile);
    if (slug) {
      tooltip.appendChild(document.createElement('br'));
      tooltip.appendChild(document.createTextNode('Click to read \u2192'));
    }
  }

  function isDark() {
    var theme = document.documentElement.getAttribute('data-theme');
    return !theme || theme !== 'light';
  }

  function nodeColor(n) {
    if (searchTerm && n.label.toLowerCase().includes(searchTerm)) {
      return isDark() ? '#ffffff' : '#111111';
    }
    if (n.community >= 0) return COMMUNITY_COLORS[n.community % COMMUNITY_COLORS.length];
    return isDark() ? '#555' : '#999';
  }

  function updateLegend(nodes) {
    var communities = {};
    nodes.forEach(function(n) {
      if (n.community >= 0) {
        if (!communities[n.community]) {
          communities[n.community] = { name: n.communityName || ('Community ' + n.community), count: 0 };
        }
        communities[n.community].count++;
      }
    });
    var comKeys = Object.keys(communities).sort(function(a,b) {
      return communities[b].count - communities[a].count;
    });
    legend.innerHTML = comKeys.map(function(c) {
        return '<span class="graph-legend-entry">' +
          '<span class="graph-legend-dot" style="background:' +
          COMMUNITY_COLORS[c % COMMUNITY_COLORS.length] + '"></span>' +
          '<span class="graph-legend-name">' + esc(communities[c].name) + '</span>' +
          '<span class="graph-legend-count">' + communities[c].count + '</span></span>';
      }).join('');
  }

  function clearLabels() {
    labelsLayer.innerHTML = '';
    if (graphData) {
      graphData.nodes.forEach(function(n) {
        n.__labelEl = null;
        n.__labelOpacity = 0;
      });
    }
  }

  function ensureLabels(nodes) {
    var dark = isDark();
    var color = dark ? '#f4f1eb' : '#211d18';
    var bg = dark ? 'rgba(9,9,11,0.55)' : 'rgba(246,242,235,0.55)';
    for (var i = 0; i < nodes.length; i++) {
      if (!nodes[i].__labelEl) {
        var el = createLabelEl(nodes[i]);
        el.style.color = color;
        el.style.backgroundColor = bg;
      }
    }
  }

  function renderGraph() {
    if (!graphData) return;
    var data = getFilteredData();
    updateLegend(data.nodes);

    if (graph) {
      clearLabels();
      graph.graphData(data);
      ensureLabels(data.nodes);
      return;
    }

    graph = ForceGraph3D()(container)
      .width(container.clientWidth || window.innerWidth)
      .height(container.clientHeight || window.innerHeight)
      .graphData(data)
      .backgroundColor('rgba(0,0,0,0)')
      .nodeLabel('')
      .nodeVal(function(n) { return Math.max(n.degree, 1); })
      .nodeColor(function(n) { return nodeColor(n); })
      .nodeOpacity(0.9)
      .nodeResolution(12)
      .linkWidth(function(e) {
        return e.confidence > 0.8 ? 1.2 : 0.4;
      })
      .linkColor(function() {
        return isDark() ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      })
      .linkOpacity(0.6)
      .linkDirectionalParticles(function(e) {
        return e.confidence > 0.8 ? 1 : 0;
      })
      .linkDirectionalParticleSpeed(0.003)
      .linkDirectionalParticleWidth(1.5)
      .linkDirectionalParticleColor(function() {
        return isDark() ? 'rgba(215,166,115,0.5)' : 'rgba(159,99,55,0.5)';
      })
      .onNodeHover(function(node, prevNode) {
        container.style.cursor = node ? 'pointer' : 'default';
        hoveredNode = node || null;
        if (node) {
          buildTooltip(node);
          tooltip.style.display = 'block';
        } else {
          tooltip.style.display = 'none';
        }
      })
      .onNodeClick(function(node) {
        var slug = slugFromSourceFile(node.sourceFile);
        if (slug) window.location.href = blogBaseUrl + slug + '/';
      })
      .d3AlphaDecay(0.02)
      .d3VelocityDecay(0.3)
      .warmupTicks(80)
      .cooldownTicks(200)
      .onRenderFramePost(function() {
        if (!graph || !graphData) return;
        var cam = graph.camera().position;
        var cx = cam.x, cy = cam.y, cz = cam.z;
        var nodes = graph.graphData().nodes;
        var w = container.clientWidth;
        var h = container.clientHeight;

        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];
          var el = node.__labelEl;
          if (!el) continue;

          var nx = node.x || 0, ny = node.y || 0, nz = node.z || 0;
          var dx = cx - nx, dy = cy - ny, dz = cz - nz;
          var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
          var score = node.degree / (dist || 1);

          var targetOpacity;
          if (node === hoveredNode) {
            targetOpacity = 1;
          } else if (score >= LABEL_FULL_THRESHOLD) {
            targetOpacity = 1;
          } else if (score <= LABEL_SHOW_THRESHOLD) {
            targetOpacity = 0;
          } else {
            targetOpacity = (score - LABEL_SHOW_THRESHOLD) / (LABEL_FULL_THRESHOLD - LABEL_SHOW_THRESHOLD);
          }

          var current = node.__labelOpacity || 0;
          var newOpacity = current + (targetOpacity - current) * 0.15;
          if (newOpacity < 0.01) newOpacity = 0;
          if (newOpacity > 0.99) newOpacity = 1;
          node.__labelOpacity = newOpacity;

          if (newOpacity <= 0) {
            el.style.opacity = '0';
            continue;
          }

          var nodeRadius = Math.cbrt(Math.max(node.degree, 1)) * 4;
          var coords = graph.graph2ScreenCoords(nx, ny + nodeRadius + 2, nz);
          if (coords.x < -100 || coords.x > w + 100 || coords.y < -50 || coords.y > h + 50) {
            el.style.opacity = '0';
            continue;
          }

          el.style.opacity = newOpacity.toFixed(2);
          el.style.left = coords.x + 'px';
          el.style.top = coords.y + 'px';
        }
      });

    ensureLabels(data.nodes);

    window.addEventListener('resize', function() {
      graph.width(container.clientWidth).height(container.clientHeight);
    });

    new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].attributeName === 'data-theme') {
          updateLabelColors();
          break;
        }
      }
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
  }

  var debounce;
  searchInput.addEventListener('input', function() {
    clearTimeout(debounce);
    debounce = setTimeout(function() {
      searchTerm = searchInput.value.toLowerCase().trim();
      renderGraph();
    }, 200);
  });

  document.querySelectorAll('.graph-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.graph-btn').forEach(function(b) {
        b.classList.remove('graph-btn-active');
      });
      btn.classList.add('graph-btn-active');
      activeFilter = btn.getAttribute('data-filter');
      renderGraph();
    });
  });
})();
</script>
{{ end }}
