{{ if or (eq .Section "blog") (eq .Kind "taxonomy") (eq .Kind "term") (eq .Type "about") }}
<div id="chat-widget-root"
     data-api-url="{{ .Site.Params.chatApiUrl | default "https://vasudev-chat.dev-95e.workers.dev" }}"
     data-lang="{{ .Site.Language.Lang }}"
     {{ if and .IsPage (ne .Type "about") }}
     data-post-url="{{ .RelPermalink }}index.txt"
     data-mode="post"
     {{ else }}
     data-post-url="{{ "/llms.txt" | relURL }}"
     data-mode="index"
     {{ end }}>
</div>
<script src="{{ "js/chat.js" | relURL }}?v={{ now.Unix }}" defer></script>
{{ end }}
