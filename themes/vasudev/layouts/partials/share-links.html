<div class="surface share-links">
  <span class="section-label">{{ i18n "sharePost" }}</span>
  <div class="share-links-row">
    <a class="button button-secondary share-btn"
       href="https://twitter.com/intent/tweet?url={{ .Permalink }}&text={{ .Title | urlquery }}"
       target="_blank" rel="noopener" aria-label="Share on X">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor" stroke="none"/></svg>
      X
    </a>
    <a class="button button-secondary share-btn"
       href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink }}"
       target="_blank" rel="noopener" aria-label="Share on LinkedIn">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="currentColor" stroke="none"/></svg>
      LinkedIn
    </a>
    <a class="button button-secondary share-btn"
       href="https://news.ycombinator.com/submitlink?u={{ .Permalink }}&t={{ .Title | urlquery }}"
       target="_blank" rel="noopener" aria-label="Share on Hacker News">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M0 0v24h24V0H0zm12.3 13.54l-3.84-7.2h1.62l2.58 5.16h.06l2.52-5.16h1.56l-3.78 7.2v4.44h-1.44v-4.44h-.28z" fill="currentColor" stroke="none"/></svg>
      HN
    </a>
    <button class="button button-secondary share-btn" id="share-copy-btn" data-url="{{ .Permalink }}" aria-label="{{ i18n "copyLink" }}">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>{{ i18n "copyLink" }}</span>
    </button>
  </div>
</div>
<script>
  (function() {
    var btn = document.getElementById('share-copy-btn');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var url = btn.getAttribute('data-url');
      navigator.clipboard.writeText(url).then(function() {
        var span = btn.querySelector('span');
        var orig = span.textContent;
        span.textContent = '{{ i18n "copied" }}';
        setTimeout(function() { span.textContent = orig; }, 2000);
      });
    });
  })();
</script>
