baseURL = "https://vasudev.xyz/"
title = "Christian Pojoni"
theme = "vasudev"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    [languages.en.params]
      description = "Systems engineer. Rust, Python, AI tooling, privacy-first architecture."
  [languages.de]
    languageName = "Deutsch"
    languageCode = "de"
    weight = 2
    [languages.de.params]
      description = "Systemingenieur. Rust, Python, KI-Werkzeuge, datenschutzorientierte Architektur."
  [languages.es]
    languageName = "Español"
    languageCode = "es"
    weight = 3
    [languages.es.params]
      description = "Ingeniero de sistemas. Rust, Python, herramientas de IA, arquitectura centrada en la privacidad."

[params]
  author = "Christian Pojoni"
  cfBeaconToken = ""

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.llmstxt]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.llmstxtfull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true
  [outputFormats.txtplain]
    mediaType = "text/plain"
    baseName = "index"
    isPlainText = true
    notAlternative = true
    permalinkable = true

[outputs]
  home = ["html", "llmstxt", "llmstxtfull"]
  section = ["html"]
  page = ["html", "txtplain"]

[params.giscus]
  repo = "5queezer/vasudev.xyz"
  repoID = "R_kgDOLkjiMw"
  category = "Announcements"
  categoryID = "DIC_kwDOLkjiM84C5UUx"
  mapping = "pathname"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  lang = "en"
