baseURL = "https://vasudev.xyz/"
title = "Christian Pojoni"
theme = "vasudev"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[params]
  description = "Systems engineer working in Rust, Python, AI tooling, and privacy-first architecture."
  author = "Christian Pojoni"
  email = "christian.pojoni@gmail.com"
  github = "https://github.com/5queezer"
  linkedin = "https://linkedin.com/in/christian-pojoni"
  nexusUrl = "https://nexus.vasudev.xyz/"
  agentEndpoint = "https://agent.vasudev.workers.dev"

  [params.giscus]
    repo = "5queezer/vasudev.xyz"
    repoId = "R_kgDOLkjiMw"
    category = "Announcements"
    categoryId = "DIC_kwDOLkjiM84C5UUx"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    theme = "preferred_color_scheme"
    lang = "en"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    [languages.en.params]
      tagline = "Systems engineer working in Rust, Python, AI tooling, and privacy-first architecture."
  [languages.de]
    languageName = "Deutsch"
    languageCode = "de"
    weight = 2
    [languages.de.params]
      tagline = "Systemingenieur. Rust, Python, KI-Werkzeuge, datenschutzorientierte Architektur."
  [languages.es]
    languageName = "Español"
    languageCode = "es"
    weight = 3
    [languages.es.params]
      tagline = "Ingeniero de sistemas. Rust, Python, herramientas de IA, arquitectura centrada en la privacidad."

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style    = "base16-snazzy"
    noClasses = false

[taxonomies]
  tag = "tags"
  series = "series"

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.llmstxt]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.llmstxtfull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true
  [outputFormats.txtplain]
    mediaType = "text/plain"
    baseName = "index"
    isPlainText = true
    notAlternative = true
    permalinkable = true

[outputs]
  home = ["html", "llmstxt", "llmstxtfull"]
  section = ["html"]
  page = ["html", "txtplain"]

[permalinks]
  blog = "/blog/:slug/"

[build]
  writeStats = true

[module]
  [module.hugoVersion]
    extended = true
    min      = "0.140.0"
