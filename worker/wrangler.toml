name = "vasudev-chat"
main = "src/index.ts"
compatibility_date = "2026-01-15"
workers_dev = true

# Optional: bind a custom route once you've added a domain to Cloudflare.
# routes = [{ pattern = "agent.vasudev.xyz/*", custom_domain = true }]

[vars]
ALLOWED_ORIGINS = "https://vasudev.xyz,http://localhost:1313"
LANGFUSE_HOST = "https://cloud.langfuse.com"
LANGFUSE_CAPTURE_CONTENT = "true"
LANGFUSE_SAMPLE_RATE = "1"

# Set with:
#   wrangler secret put OPENROUTER_API_KEY
#   wrangler secret put LANGFUSE_PUBLIC_KEY
#   wrangler secret put LANGFUSE_SECRET_KEY
# (Get a free OpenRouter key at https://openrouter.ai/ — Nemotron 70B is on the free tier.)
