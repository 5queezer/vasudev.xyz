name: Translate blog posts

on:
  push:
    branches: ["master"]
    paths:
      - "content/blog/*.md"
      - "!content/blog/*.de.md"
      - "!content/blog/*.es.md"
      - "cmd/translate/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translate-posts
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Translate posts
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
        run: |
          cd cmd/translate && go run main.go \
            --content-dir ../../content/blog \
            --languages de,es

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/*.de.md content/blog/*.es.md
          if git diff --cached --quiet; then
            echo "No translation changes to commit"
            exit 0
          fi

          git commit -m "i18n: auto-translate blog posts to de/es"

          for attempt in 1 2 3; do
            git fetch origin master
            if git rebase origin/master && git push origin HEAD:master; then
              exit 0
            fi

            git rebase --abort || true

            if [ "$attempt" -lt 3 ]; then
              echo "Push attempt $attempt failed; retrying on latest origin/master"
              sleep 5
            fi
          done

          echo "Failed to push translated posts after rebasing onto latest origin/master" >&2
          exit 1
