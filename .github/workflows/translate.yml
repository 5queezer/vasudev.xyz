name: Translate content

on:
  push:
    branches: ["master"]
    paths:
      - "content/blog/**/*.md"
      - "content/guides/**/*.md"
      - "!content/**/*.de.md"
      - "!content/**/*.es.md"
      - "cmd/translate/**"
      - ".github/workflows/translate.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: translate-content
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cmd/translate/go.mod

      - name: Translate content
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_MODEL_FALLBACKS: ${{ vars.LLM_MODEL_FALLBACKS }}
          LLM_MODELS: ${{ vars.LLM_MODELS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          TRANSLATE_MAX_ATTEMPTS: "1"
          TRANSLATE_HTTP_TIMEOUT_SECONDS: "45"
        run: |
          cd cmd/translate
          go run main.go \
            --content-dir ../../content/guides \
            --languages de,es \
            --include-index \
            --index-only
          go run main.go \
            --content-dir ../../content/blog \
            --languages de,es

      - name: Open PR with translations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog content/guides
          if git diff --cached --quiet; then
            echo "No translation changes to commit"
            exit 0
          fi

          branch="bot/translations-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$branch"
          git commit -m "i18n: auto-translate content to de/es"
          git push origin "$branch"

          gh pr create \
            --base master \
            --head "$branch" \
            --title "i18n: auto-translate content to de/es" \
            --body "Automated translation of blog posts and guides to German and Spanish from workflow run ${GITHUB_RUN_ID}."

          gh pr merge --squash --delete-branch "$branch"
