name: Generate og:images for blog posts

on:
  push:
    branches: ["master"]
    paths:
      - "content/blog/*.md"
      - "!content/blog/*.de.md"
      - "!content/blog/*.es.md"
      - "cmd/generate-og-images/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-og-images
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cmd/generate-og-images/go.mod

      - name: Generate og:images
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_MODEL_FALLBACKS: ${{ vars.LLM_MODEL_FALLBACKS }}
          LLM_MODELS: ${{ vars.LLM_MODELS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: |
          cd cmd/generate-og-images && go run main.go \
            --content-dir ../../content/blog \
            --images-dir ../../static/images

      - name: Open PR with generated images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/images/*-og.png static/images/.og-hashes/ content/blog/*.md
          if git diff --cached --quiet; then
            echo "No og:image changes to commit"
            exit 0
          fi

          branch="bot/og-images-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git commit -m "chore: auto-generate og:images for blog posts"
          git push origin "$branch"

          gh pr create \
            --base master \
            --head "$branch" \
            --title "chore: auto-generate og:images for blog posts" \
            --body "Automated og:image generation from workflow run ${GITHUB_RUN_ID}."

          gh pr merge --auto --squash --delete-branch "$branch"
