name: Translate guide indexes

on:
  push:
    branches: ["master"]
    paths:
      - "content/guides/**/_index.md"
      - "!content/**/*.de.md"
      - "!content/**/*.es.md"
      - "cmd/translate/**"
      - ".github/workflows/translate-guides.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: translate-guide-indexes
  cancel-in-progress: true

jobs:
  translate-guides:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cmd/translate/go.mod

      - name: Translate guide indexes
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
          TRANSLATE_MAX_ATTEMPTS: "1"
          TRANSLATE_HTTP_TIMEOUT_SECONDS: "20"
        run: |
          cd cmd/translate
          go run main.go \
            --content-dir ../../content/guides \
            --languages de,es \
            --include-index \
            --index-only

      - name: Open PR with guide translations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/guides
          if git diff --cached --quiet; then
            echo "No guide translation changes to commit"
            exit 0
          fi

          branch="bot/guide-index-translations-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$branch"
          git commit -m "i18n: auto-translate guide indexes to de/es"
          git push origin "$branch"

          gh pr create \
            --base master \
            --head "$branch" \
            --title "i18n: auto-translate guide indexes to de/es" \
            --body "Automated translation of guide indexes to German and Spanish from workflow run ${GITHUB_RUN_ID}."

          gh pr merge --squash --delete-branch "$branch"
