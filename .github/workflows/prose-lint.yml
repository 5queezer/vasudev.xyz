name: Prose & Style Lint

on:
  pull_request:
    paths:
      - "content/blog/**"
      - "styles/config/vocabularies/**"

jobs:
  vale:
    name: Vale prose lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: errata-ai/vale-action@v2
        with:
          files: content/blog
          vale_flags: "--glob=!*.{de,es}.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  front-matter:
    name: Front matter check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required front matter fields
        run: |
          status=0
          for file in content/blog/*.md; do
            [ "$(basename "$file")" = "_index.md" ] && continue
            echo "$(basename "$file")" | grep -qE '\.(de|es)\.md$' && continue
            for field in title date tags description; do
              if ! grep -q "^${field}:" "$file"; then
                echo "::error file=${file}::Missing required front matter field: ${field}"
                status=1
              fi
            done
          done
          exit $status

      - name: Validate tags against allowlist
        run: |
          status=0
          allowed="data/allowed-tags.txt"
          for file in content/blog/*.md; do
            [ "$(basename "$file")" = "_index.md" ] && continue
            echo "$(basename "$file")" | grep -qE '\.(de|es)\.md$' && continue
            tags=$(grep '^tags:' "$file" | sed 's/tags:\s*\[//;s/\]//;s/"//g' | tr ',' '\n' | sed 's/^ *//;s/ *$//')
            for tag in $tags; do
              if ! grep -qx "$tag" "$allowed"; then
                echo "::error file=${file}::Tag \"${tag}\" not in ${allowed}"
                status=1
              fi
            done
          done
          exit $status
