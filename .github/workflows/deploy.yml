name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "content/blog/*.md"
      - "cmd/translate/**"
  workflow_run:
    workflows: ["Translate blog posts"]
    types: [completed]
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.145.0"
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build chat widget
        run: cd chat && npm ci && npm run build

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cmd/sync-graph/go.mod

      - name: Enrich graph data with community names
        run: cd cmd/sync-graph && go run main.go --graphify-dir ../../graphify-out --output ../../static/data/graph.json

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Vienna
          HUGO_PARAMS_CFBEACONTOKEN: ${{ secrets.CF_BEACON_TOKEN }}
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
