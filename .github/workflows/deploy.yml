name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "content/blog/*.md"
      - "cmd/translate/**"
      - "graphify-out/**"
  workflow_run:
    workflows: ["Translate blog posts"]
    types: [completed]
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.145.0"
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build chat widget
        run: cd chat && npm ci && npm run build

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cmd/sync-graph/go.mod

      - name: Auto-extend graphify-out with new posts
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_MODEL_FALLBACKS: ${{ vars.LLM_MODEL_FALLBACKS }}
          LLM_MODELS: ${{ vars.LLM_MODELS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.OPENROUTER_API_KEY }}
        run: |
          cd cmd/graphify-update && go run main.go \
            --content-dir ../../content/blog \
            --source-prefix content/blog \
            --graph-file ../../graphify-out/graph.json

      - name: Commit regenerated graphify-out
        run: |
          set -euo pipefail
          if git diff --quiet graphify-out/; then
            echo "graphify-out unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/
          git commit -m "chore: auto-extend graphify-out with new blog posts"
          # Push to master via the workflow token. The deploy trigger
          # ignores graphify-out/** so this push does not loop.
          git push origin HEAD:master

      - name: Verify graph freshness
        run: |
          set -euo pipefail
          posts=$(find content/blog -maxdepth 1 -name '*.md' ! -name '_*.md' ! -name '*.de.md' ! -name '*.es.md' | sort)
          indexed=$(python3 -c "
          import json
          d = json.load(open('graphify-out/graph.json'))
          for f in sorted({n.get('source_file','') for n in d['nodes']}):
              if f.startswith('content/blog/'):
                  print(f)
          ")
          missing=()
          while IFS= read -r p; do
            grep -qxF "$p" <<<"$indexed" || missing+=("$p")
          done <<<"$posts"
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Graph still stale after auto-extend. Missing posts:"
            printf '  - %s\n' "${missing[@]}"
            echo ""
            echo "The auto-extend step did not produce entries for these posts."
            echo "Check the previous step's logs for LLM errors. As a fallback:"
            echo "  /graphify content/blog --update"
            echo "  git add graphify-out/ && git commit && git push"
            exit 1
          fi
          echo "Graph fresh: $(wc -l <<<"$posts") posts indexed."

      - name: Enrich graph data with community names
        run: cd cmd/sync-graph && go run main.go --graphify-dir ../../graphify-out --output ../../static/data/graph.json --root ../..

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Vienna
          HUGO_PARAMS_CFBEACONTOKEN: ${{ secrets.CF_BEACON_TOKEN }}
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
